# deploy/fds/nginx.conf
events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    
    # --- 1. Оптимизация сети ---
    sendfile        on;
    tcp_nopush      on;  # Позволяет отправлять заголовки ответа и начало файла в одном сетевом пакете
    tcp_nodelay     on;  # Отключает задержку при отправке мелких пакетов
    keepalive_timeout  65;
    charset utf-8;       # Гарантируем, что кириллица в WebApp не сломается

    # --- 2. Сжатие GZIP (Ускорит загрузку виджетов Яндекса и СДЭКа) ---
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    server {
        listen 80;
        server_name localhost;

        access_log /var/log/nginx/access.log;
        error_log  /var/log/nginx/error.log;

        # Явный health endpoint для инфраструктурных проверок.
        location = /health {
            access_log off;
            default_type text/plain;
            add_header Cache-Control "no-store";
            return 200 "ok\n";
        }

        # --- Блок 1: Файлы для бота (СКАЧИВАНИЕ) ---
        location /databases/ {
            alias /usr/share/nginx/html/databases/;
            autoindex on;
            
            # ЗАЩИТА БОТА: Строго запрещаем кэшировать файлы баз данных. 
            # Бот всегда скачает самый свежий файл напрямую с диска.
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            
            limit_except GET HEAD {
                deny all;
            }
        } 

        # --- Блок 2: Веб-виджеты (БРАУЗЕРЫ) ---
        location /web/ {
            alias /usr/share/nginx/html/web/;
            index index.html;
            autoindex off;

            # УСКОРЕНИЕ WEBAPP: Говорим телефону сохранить HTML в памяти на 1 час.
            # При повторном открытии СДЭКа/Яндекса страница откроется мгновенно.
            expires 1h;
            add_header Cache-Control "public, max-age=3600, no-transform";
        }
    }
}
