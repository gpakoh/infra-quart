# ============================================
# infra-quart — orchestration entry point
# Profiles: core, llm, embeddings, memory,
#           opencode, monitoring, federation
# ============================================

x-logging: &default-logging
  driver: journald
  options:
    tag: "{{.Name}}"

services:

  # ==========================================
  # Core (profile: core)
  # ==========================================

  postgres:
    profiles: [core]
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    container_name: RAG_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-raguser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_DB: ${POSTGRES_DB:-rag_vectordb}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-raguser} -d ${POSTGRES_DB:-rag_vectordb}"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - infra-net
    logging: *default-logging

  redis:
    profiles: [core]
    image: redis:7-alpine
    restart: unless-stopped
    container_name: RAG_redis
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redis-data:/data
    networks:
      - infra-net
    logging: *default-logging

  # ==========================================
  # Quart Core (profile: core)
  # ==========================================

  quart-core:
    profiles: [core]
    build:
      context: ./services/quart-core
      dockerfile: Dockerfile
    restart: unless-stopped
    container_name: RAG_quart_core
    environment:
      APP_PORT: "5000"
      LOG_FORMAT: json
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      RAG_DB_HOST: postgres
      RAG_DB_PORT: "5432"
      RAG_DB_USER: ${POSTGRES_USER:-raguser}
      RAG_DB_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      RAG_DB_NAME: ${POSTGRES_DB:-rag_vectordb}
      OLLAMA_URL: ${OLLAMA_URL:-http://ollama:11434}
      INFINITY_URL: ${INFINITY_URL:-http://infinity:7997}
      ADMIN_API_KEY: ${ADMIN_API_KEY:-change-me}
      FEDERATION_SECRET: ${FEDERATION_SECRET:-change-me}
      ZEP_API_URL: ${ZEP_API_URL:-http://zep:8000}
      RAG_LIBRARY_ENABLED: ${RAG_LIBRARY_ENABLED:-true}
      RAG_LIBRARY_URL: ${RAG_LIBRARY_URL:-http://rag-library-service:8010}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      rag-library-service:
        condition: service_healthy
    ports:
      - "${QUART_CORE_PORT:-8000}:5000"
    networks:
      - infra-net
    logging: *default-logging

  # ==========================================
  # LLM (profile: llm)
  # ==========================================

  ollama:
    profiles: [llm]
    image: ollama/ollama:latest
    restart: unless-stopped
    container_name: RAG_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - infra-net
    logging: *default-logging

  # ==========================================
  # Embeddings (profile: embeddings)
  # ==========================================

  infinity:
    profiles: [embeddings]
    image: michaelf34/infinity:latest
    restart: unless-stopped
    container_name: RAG_infinity
    ports:
      - "7997:7997"
    command: ["--v2", "--port", "7997"]
    networks:
      - infra-net
    logging: *default-logging

  # ==========================================
  # RAG Library Service (profiles: core, memory)
  # ==========================================

  rag-library-service:
    profiles: [core, memory]
    build:
      context: ./services/rag-library-service
      dockerfile: Dockerfile
    restart: unless-stopped
    container_name: RAG_rag_library
    environment:
      PORT: "8010"
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-raguser}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-rag_vectordb}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      LOG_LEVEL: INFO
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "${RAG_LIBRARY_PORT:-8010}:8010"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8010/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - infra-net
    logging: *default-logging

  # ==========================================
  # Memory (profile: memory)
  # ==========================================

  zep:
    profiles: [memory]
    build:
      context: ./deploy/zep
      dockerfile: Dockerfile
    restart: unless-stopped
    container_name: RAG_zep
    ports:
      - "8000:8000"
    environment:
      ZEP_STORE_TYPE: postgres
      ZEP_DATABASE_URL: postgresql://${POSTGRES_USER:-raguser}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-rag_vectordb}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - infra-net
    logging: *default-logging

  # ==========================================
  # OpenCode Adapter (profile: opencode)
  # ==========================================

  opencode-adapter:
    profiles: [opencode]
    build:
      context: ./services/opencode-adapter
      dockerfile: Dockerfile
    restart: unless-stopped
    container_name: RAG_opencode-adapter
    ports:
      - "8008:8007"
    environment:
      OPENCODE_SERVER_PASSWORD: ${OPENCODE_SERVER_PASSWORD:-change-me}
      OPENCODE_SERVER_USERNAME: opencode
      PYTHONUNBUFFERED: "1"
    volumes:
      - opencode-data:/root/.local/share/opencode
      - opencode-config:/root/.opencode
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8007/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - infra-net
    logging: *default-logging

  # ==========================================
  # Monitoring (profile: monitoring)
  # ==========================================

  prometheus:
    profiles: [monitoring]
    image: prom/prometheus:latest
    restart: unless-stopped
    container_name: RAG_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    networks:
      - infra-net
    logging: *default-logging

  grafana:
    profiles: [monitoring]
    image: grafana/grafana:latest
    restart: unless-stopped
    container_name: RAG_grafana
    ports:
      - "4999:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./deploy/monitoring/grafana-dashboard.json:/etc/grafana/provisioning/dashboards/quart-bot.json
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - infra-net
    logging: *default-logging

  # ==========================================
  # File Distribution Service (profile: federation)
  # ==========================================

  fds:
    profiles: [federation]
    image: nginx:alpine
    restart: unless-stopped
    container_name: RAG_fds
    ports:
      - "8081:80"
    volumes:
      - ./deploy/fds/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - infra-net
    logging: *default-logging

volumes:
  pgdata:
  redis-data:
  ollama-data:
  prometheus-data:
  grafana-data:
  opencode-data:
  opencode-config:

networks:
  infra-net:
    driver: bridge
