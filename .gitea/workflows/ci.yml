name: infra-quart CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Install SSH client for submodule checkout
        run: apt-get update -qq && apt-get install -y -qq git openssh-client 2>&1 | tail -3
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Check leaked secrets
        run: ./scripts/check-secrets.sh

      - name: Validate docker-compose config
        run: docker compose config

      - name: Validate config (all profiles)
        run: |
          for p in core llm embeddings memory opencode monitoring federation; do
            docker compose --profile "$p" config > /dev/null
          done

      - name: Test Dockerfile build (opencode-adapter)
        run: docker compose --profile opencode build

      - name: Test Dockerfile build (quart-core)
        run: docker compose --profile core build quart-core

      - name: Test Dockerfile build (rag-library-service)
        run: docker compose --profile core --profile memory build rag-library-service

  build-database:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Install SSH client for submodule checkout
        run: apt-get update -qq && apt-get install -y -qq git openssh-client 2>&1 | tail -3
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Build custom database image (pgvector + AGE)
        run: docker compose --profile core build postgres
